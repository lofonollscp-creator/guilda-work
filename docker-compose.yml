# Servicios auxiliares de Guilda Work (ninguno reemplaza a serve.py/GuildaWork.exe
# — la app en sí sigue corriendo tal cual, fuera de Docker, ver HOSTING.md).
# Se levantan aparte, apuntando al mismo data/registro.db, sin tocar nada de app/.
#
# Uso local (verificación en este PC):   docker compose up -d
# Uso en el VPS (Fase 3c de HOSTING.md): mismo comando, tras clonar el repo allí,
# con KRATOS_UI_ORIGIN/HYDRA_PUBLIC_ORIGIN/GUILDA_ORIGIN/OUTLINE_PUBLIC_ORIGIN
# fijados en .env a las URLs públicas reales (ver HOSTING.md, sección Docker).
#
# Todos los `ports:` de aquí abajo se publican en 127.0.0.1, NUNCA en
# 0.0.0.0 — Docker manipula iptables directamente para publicar puertos y
# eso SALTA POR ENCIMA de ufw (un `ufw deny 4444` no basta para bloquear un
# puerto publicado por Docker sin este `127.0.0.1:` explícito). En el VPS,
# Caddy corre en el host (fuera de Docker) y sí puede alcanzar localhost
# para hacer de proxy inverso con HTTPS — nada de esto queda expuesto
# directamente a internet.
#
# Metabase (Fase "integraciones de código abierto" del plan): panel de análisis
# sobre data/registro.db. El driver de SQLite viene ya incluido en la imagen
# oficial de Metabase — no hace falta ningún plugin aparte.
#
# Se monta la CARPETA data/ completa (no solo el .db) porque la app usa WAL
# mode (PRAGMA journal_mode=WAL, Fase 3a) — SQLite necesita poder ver/crear
# los archivos -wal/-shm que viven junto al .db para abrir la conexión, algo
# que un mount de un único archivo no permite. En la práctica, Metabase solo
# hace SELECT (nunca hay ninguna escritura real desde la UI de análisis), así
# que no hace falta forzar :ro para estar a salvo del "usuario que se despista
# y edita algo" — no hay ninguna vía en la interfaz de Metabase para editar
# filas. Si se quisiera un aislamiento estricto a nivel de sistema de
# archivos, la alternativa es apuntar Metabase a una copia periódica del .db
# en vez de al archivo en vivo (ver plan: "vía de escape con pgloader/Postgres").
services:
  metabase:
    image: metabase/metabase:latest
    container_name: guilda-work-metabase
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./data:/data
      - metabase-data:/metabase-data
    environment:
      MB_DB_FILE: /metabase-data/metabase.db

  # MinIO: almacenamiento de objetos compatible con S3, 100% self-hosted.
  # Uso previsto (plan "integraciones de código abierto"): destino de las
  # copias de Litestream (ver litestream.yml), sin depender de un bucket de
  # pago (AWS/Backblaze). El bucket en sí (guilda-backups) se crea aparte,
  # a mano o con `mc`, no en este compose — ver deploy/ para el paso a paso.
  minio:
    image: minio/minio:latest
    container_name: guilda-work-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"   # API S3
      - "127.0.0.1:9001:9001"   # Consola web
    volumes:
      - minio-data:/data
    environment:
      MINIO_ROOT_USER: guilda_admin
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-CambiaEstaClave2026}

  # n8n: automatización de flujos sobre la API REST ya existente
  # (app/rutas_api.py, Fase 2) — n8n es, para Guilda Work, "otro cliente
  # autenticado más", igual que la app móvil: llama a /api/v1/... con un
  # token, sin que haga falta ningún cambio de backend.
  #
  # host.docker.internal apunta al PC anfitrión (donde corre serve.py o
  # GuildaWork.exe fuera de Docker, ver HOSTING.md) — así los flujos de
  # n8n pueden llamar a http://host.docker.internal:8000/api/v1/... para
  # probar contra la app real en local. En el VPS, serve.py corre en la
  # misma máquina que Docker, así que ahí también aplica host.docker.internal
  # (o localhost si se prefiere red "host").
  n8n:
    image: n8nio/n8n:latest
    container_name: guilda-work-n8n
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n

  # Ory Kratos: identidad real para el modo hospedado de Guilda Work
  # (Fase 7a del plan) — sustituye la comprobación de contraseña casera
  # como origen de verdad, sin tocar cli.py/mcp_server.py (usuario local,
  # nunca pasa por aquí) ni el modo escritorio (GuildaWork.exe).
  postgres-kratos:
    image: postgres:16-alpine
    container_name: guilda-work-postgres-kratos
    restart: unless-stopped
    environment:
      POSTGRES_USER: kratos
      POSTGRES_PASSWORD: ${KRATOS_DB_PASSWORD:-CambiaEstaClaveKratos2026}
      POSTGRES_DB: kratos
    volumes:
      - postgres-kratos-data:/var/lib/postgresql/data

  kratos-migrate:
    image: oryd/kratos:latest
    container_name: guilda-work-kratos-migrate
    depends_on:
      - postgres-kratos
    environment:
      DSN: postgres://kratos:${KRATOS_DB_PASSWORD:-CambiaEstaClaveKratos2026}@postgres-kratos:5432/kratos?sslmode=disable
    volumes:
      - ./deploy/kratos:/etc/config/kratos:ro
    command: migrate sql -e --yes --config /etc/config/kratos/kratos.yml
    restart: on-failure

  kratos:
    image: oryd/kratos:latest
    container_name: guilda-work-kratos
    restart: unless-stopped
    depends_on:
      - kratos-migrate
    environment:
      DSN: postgres://kratos:${KRATOS_DB_PASSWORD:-CambiaEstaClaveKratos2026}@postgres-kratos:5432/kratos?sslmode=disable
      # Estas dos son sobre Kratos mismo: se quedan en 127.0.0.1 siempre —
      # solo las usa serve.py, en la misma máquina, y sus URLs se
      # reescriben a rutas relativas /.ory/... antes de llegar al
      # navegador (ver app/kratos.py). Nunca deben ser la URL pública.
      SERVE_PUBLIC_BASE_URL: http://127.0.0.1:4433/
      SERVE_ADMIN_BASE_URL: http://127.0.0.1:4434/
      # Estas SÍ son URLs que ve el navegador — origen público de la
      # propia Guilda Work (GUILDA_ORIGIN, definido en .env en el VPS
      # real; por defecto http://127.0.0.1:8000 en local). Cada variable
      # sobreescribe una clave de deploy/kratos/kratos.yml siguiendo la
      # convención de Ory (SCREAMING_SNAKE del camino en el YAML) — Kratos
      # NO hace sustitución de plantilla ${VAR} dentro del archivo, cada
      # env var reemplaza la clave entera.
      SELFSERVICE_DEFAULT_BROWSER_RETURN_URL: ${GUILDA_ORIGIN:-http://127.0.0.1:8000}/
      SELFSERVICE_ALLOWED_RETURN_URLS: '["${GUILDA_ORIGIN:-http://127.0.0.1:8000}/","${GUILDA_ORIGIN:-http://127.0.0.1:8000}/hydra/login"]'
      SELFSERVICE_FLOWS_LOGIN_UI_URL: ${GUILDA_ORIGIN:-http://127.0.0.1:8000}/login
      SELFSERVICE_FLOWS_REGISTRATION_UI_URL: ${GUILDA_ORIGIN:-http://127.0.0.1:8000}/registro
      SELFSERVICE_FLOWS_LOGOUT_AFTER_DEFAULT_BROWSER_RETURN_URL: ${GUILDA_ORIGIN:-http://127.0.0.1:8000}/login
      SELFSERVICE_FLOWS_SETTINGS_UI_URL: ${GUILDA_ORIGIN:-http://127.0.0.1:8000}/ajustes-cuenta
      SELFSERVICE_FLOWS_ERROR_UI_URL: ${GUILDA_ORIGIN:-http://127.0.0.1:8000}/login
      SERVE_PUBLIC_CORS_ALLOWED_ORIGINS: '["${GUILDA_ORIGIN:-http://127.0.0.1:8000}"]'
    ports:
      - "127.0.0.1:4433:4433"   # API pública (self-service)
      - "127.0.0.1:4434:4434"   # API admin (gestión de identidades)
    volumes:
      - ./deploy/kratos:/etc/config/kratos:ro
    command: serve --config /etc/config/kratos/kratos.yml --dev

  # Ory Hydra: proveedor OAuth2/OIDC (Fase 7b) — necesario porque Outline
  # (y más adelante OpenProject) no tienen login con contraseña propio,
  # solo saben delegar en un proveedor externo. El "login/consent" lo
  # resuelve app/rutas_hydra.py (prefijo /hydra) apoyándose en la sesión
  # de Kratos que ya exista (Fase 7a) — ver deploy/hydra/hydra.yml.
  postgres-hydra:
    image: postgres:16-alpine
    container_name: guilda-work-postgres-hydra
    restart: unless-stopped
    environment:
      POSTGRES_USER: hydra
      POSTGRES_PASSWORD: ${HYDRA_DB_PASSWORD:-CambiaEstaClaveHydra2026}
      POSTGRES_DB: hydra
    volumes:
      - postgres-hydra-data:/var/lib/postgresql/data

  hydra-migrate:
    image: oryd/hydra:latest
    container_name: guilda-work-hydra-migrate
    depends_on:
      - postgres-hydra
    environment:
      DSN: postgres://hydra:${HYDRA_DB_PASSWORD:-CambiaEstaClaveHydra2026}@postgres-hydra:5432/hydra?sslmode=disable
    volumes:
      - ./deploy/hydra:/etc/config/hydra:ro
    command: migrate sql -e --yes --config /etc/config/hydra/hydra.yml
    restart: on-failure

  hydra:
    image: oryd/hydra:latest
    container_name: guilda-work-hydra
    restart: unless-stopped
    depends_on:
      - hydra-migrate
    environment:
      DSN: postgres://hydra:${HYDRA_DB_PASSWORD:-CambiaEstaClaveHydra2026}@postgres-hydra:5432/hydra?sslmode=disable
      SECRETS_SYSTEM: ${HYDRA_SYSTEM_SECRET:-CambiaEsteSecretoHydra2026CambiaEsteSecretoHydra2026}
      # A diferencia de Kratos, el navegador SÍ habla directo con la API
      # pública de Hydra (Outline le redirige ahí durante el OAuth2) — por
      # eso SERVE_PUBLIC_BASE_URL/URLS_SELF_ISSUER tienen que ser una URL
      # de verdad alcanzable desde fuera en despliegue real
      # (https://hydra.tu-hostname en el VPS, var HYDRA_PUBLIC_ORIGIN), a
      # diferencia del caso de Kratos (que se queda en 127.0.0.1, ver
      # servicio `kratos` más arriba). URLS_LOGIN/CONSENT/LOGOUT son
      # rutas del propio puente de Guilda Work (app/rutas_hydra.py), así
      # que usan GUILDA_ORIGIN en vez de HYDRA_PUBLIC_ORIGIN. Misma
      # convención de Ory que en el servicio `kratos`: cada env var
      # sobreescribe una clave de deploy/hydra/hydra.yml, sin sustitución
      # de plantilla dentro del archivo.
      SERVE_PUBLIC_BASE_URL: ${HYDRA_PUBLIC_ORIGIN:-http://127.0.0.1:4444}/
      SERVE_PUBLIC_CORS_ALLOWED_ORIGINS: '["${GUILDA_ORIGIN:-http://127.0.0.1:8000}"]'
      URLS_SELF_ISSUER: ${HYDRA_PUBLIC_ORIGIN:-http://127.0.0.1:4444}/
      URLS_LOGIN: ${GUILDA_ORIGIN:-http://127.0.0.1:8000}/hydra/login
      URLS_CONSENT: ${GUILDA_ORIGIN:-http://127.0.0.1:8000}/hydra/consent
      URLS_LOGOUT: ${GUILDA_ORIGIN:-http://127.0.0.1:8000}/hydra/logout
      # Sin esto, Hydra ve la conexión que le llega de Caddy como "http"
      # (Caddy termina TLS y le reenvía en plano, igual que a cualquier
      # otro servicio de este stack) — en modo `--dev`, eso hace que sus
      # cookies de login/consent (`ory_hydra_login_csrf_...`) lleven
      # `SameSite=None` (las necesita para sobrevivir la ida y vuelta
      # entre dominios del login) pero SIN `Secure`, y Chrome/todos los
      # navegadores modernos RECHAZAN EN SILENCIO cualquier cookie
      # SameSite=None sin Secure — nunca llega a guardarse, y el login
      # falla con "request_forbidden ... No CSRF value available in the
      # session cookie" (encontrado depurando la Fase 8 en local, pero
      # afecta exactamente igual al VPS — Caddy hace ahí lo mismo).
      # `serve.cookies.secure` fuerza el flag Secure independientemente
      # de lo que Hydra perciba — seguro fijarlo siempre a "true" porque
      # el puerto de Hydra nunca se publica en 0.0.0.0 (ver cabecera del
      # archivo), así que un cliente sin HTTPS real jamás llega hasta él.
      SERVE_COOKIES_SECURE: "true"
    ports:
      - "127.0.0.1:4444:4444"   # API pública (OAuth2/OIDC) — Caddy la publica de verdad
      - "127.0.0.1:4445:4445"   # API admin (login/consent, gestión de clientes) — nunca pública
    volumes:
      - ./deploy/hydra:/etc/config/hydra:ro
    command: serve --config /etc/config/hydra/hydra.yml all --dev

  # Outline: wiki/base de conocimiento para guías de empleados (Fase 7b).
  # No tiene login con contraseña propio — exige un proveedor OIDC externo
  # desde el primer inicio de sesión, de ahí Hydra por encima. Los
  # adjuntos van al MinIO ya desplegado (bucket outline-uploads, se crea
  # aparte con `mc mb`, igual que guilda-backups — ver HOSTING.md).
  postgres-outline:
    image: postgres:16-alpine
    container_name: guilda-work-postgres-outline
    restart: unless-stopped
    environment:
      POSTGRES_USER: outline
      POSTGRES_PASSWORD: ${OUTLINE_DB_PASSWORD:-CambiaEstaClaveOutline2026}
      POSTGRES_DB: outline
    volumes:
      - postgres-outline-data:/var/lib/postgresql/data

  redis-outline:
    image: redis:7-alpine
    container_name: guilda-work-redis-outline
    restart: unless-stopped
    volumes:
      - redis-outline-data:/data

  outline:
    image: outlinewiki/outline:latest
    container_name: guilda-work-outline
    restart: unless-stopped
    depends_on:
      - postgres-outline
      - redis-outline
    ports:
      - "127.0.0.1:3001:3000"   # 3000 ya lo usa Metabase
    environment:
      # Outline exige NODE_ENV=production para servir cookies `secure`, lo
      # que a su vez exige que el navegador vea HTTPS de verdad (propio o
      # de un proxy TLS delante, ver HOSTING.md Fase 3c) — sin eso, el
      # flujo OAuth2 falla con "Cannot send secure cookie over unencrypted
      # connection". En local (sin proxy TLS) usa NODE_ENV=development
      # para poder verificar el flujo entero por http://127.0.0.1:3001 —
      # OJO: en ese modo la interfaz no renderiza (la imagen de producción
      # no trae el código fuente que pediría el servidor de desarrollo de
      # Vite), solo sirve para inspeccionar peticiones/errores por curl.
      NODE_ENV: ${OUTLINE_NODE_ENV:-production}
      SECRET_KEY: ${OUTLINE_SECRET_KEY:?define OUTLINE_SECRET_KEY (openssl rand -hex 32)}
      UTILS_SECRET: ${OUTLINE_UTILS_SECRET:?define OUTLINE_UTILS_SECRET (openssl rand -hex 32)}
      DATABASE_URL: postgres://outline:${OUTLINE_DB_PASSWORD:-CambiaEstaClaveOutline2026}@postgres-outline:5432/outline
      DATABASE_URL_TEST: postgres://outline:${OUTLINE_DB_PASSWORD:-CambiaEstaClaveOutline2026}@postgres-outline:5432/outline-test
      PGSSLMODE: disable
      REDIS_URL: redis://redis-outline:6379
      # URL pública de verdad (https://outline.tu-hostname en el VPS) — la
      # necesita para construir enlaces/cookies correctos. FORCE_HTTPS a
      # "true" en despliegue real: Caddy delante SÍ da HTTPS de verdad al
      # navegador, así que la cookie `secure` que exige NODE_ENV=production
      # funciona sin problema (a diferencia de la verificación local por
      # http:// sin proxy, donde tuvo que probarse en development).
      URL: ${OUTLINE_PUBLIC_ORIGIN:-http://127.0.0.1:3001}
      PORT: 3000
      FORCE_HTTPS: ${OUTLINE_FORCE_HTTPS:-false}
      # MinIO ya desplegado (integración anterior) — endpoint interno
      # (contenedor a contenedor) para las subidas, endpoint público para
      # las URLs que ve el navegador (mismo matiz que Kratos, ver app/kratos.py).
      AWS_ACCESS_KEY_ID: guilda_admin
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-CambiaEstaClave2026}
      AWS_REGION: us-east-1
      AWS_S3_UPLOAD_BUCKET_URL: http://minio:9000
      AWS_S3_UPLOAD_BUCKET_NAME: outline-uploads
      AWS_S3_FORCE_PATH_STYLE: "true"
      AWS_S3_ACL: private
      # Se sirve tal cual (sin proxy) — el navegador pide las imágenes
      # directo a MinIO en su puerto público.
      AWS_S3_UPLOAD_MAX_SIZE: "26214400"
      # Ory Hydra ya desplegado (Fase 7b) — único proveedor OIDC de Outline.
      # AUTH_URI la ve el navegador (pública); TOKEN/USERINFO los llama
      # Outline server-to-server, dentro de la red de Docker (hostname
      # interno, a diferencia de serve.py que corre fuera).
      OIDC_CLIENT_ID: ${OUTLINE_OIDC_CLIENT_ID:?define tras ejecutar scripts/registrar_cliente_hydra.py}
      OIDC_CLIENT_SECRET: ${OUTLINE_OIDC_CLIENT_SECRET:?define tras ejecutar scripts/registrar_cliente_hydra.py}
      OIDC_AUTH_URI: ${HYDRA_PUBLIC_ORIGIN:-http://127.0.0.1:4444}/oauth2/auth
      OIDC_TOKEN_URI: http://hydra:4444/oauth2/token
      OIDC_USERINFO_URI: http://hydra:4444/userinfo
      OIDC_USERNAME_CLAIM: email
      OIDC_DISPLAY_NAME: "Guilda Work"
      OIDC_SCOPES: "openid email profile"

  # Element + Synapse: chat de verdad (Fase 7d) — sustituye a la idea de
  # un chat propio dentro de Guilda Work, decisión explícita del usuario
  # una vez Kratos/Hydra ya estaban desplegados. Sin federación (ver
  # deploy/synapse/guilda-overrides.yaml) — el chat es solo para el
  # equipo de Guilda Work, no para interoperar con otros servidores
  # Matrix. Login solo vía Ory Hydra, igual que Outline.
  postgres-synapse:
    image: postgres:16-alpine
    container_name: guilda-work-postgres-synapse
    restart: unless-stopped
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: ${SYNAPSE_DB_PASSWORD:-CambiaEstaClaveSynapse2026}
      POSTGRES_DB: synapse
      # Synapse recomienda collation C + encoding UTF8 — además, la
      # imagen alpine de Postgres solo soporta bien la locale C de
      # todas formas (musl libc, sin locales completas), así que fijarlo
      # explícito no cambia nada respecto al comportamiento por defecto,
      # solo lo deja documentado.
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres-synapse-data:/var/lib/postgresql/data

  # Genera /data/homeserver.yaml a partir de las variables de entorno la
  # primera vez (mismo patrón que kratos-migrate/hydra-migrate) — esta
  # versión de la imagen de Synapse YA NO genera la config sola al
  # arrancar en modo `run`, hace falta este paso `migrate_config`
  # explícito antes. Termina y no vuelve a hacer nada en arranques
  # posteriores (el archivo ya existe en el volumen persistente).
  synapse-migrate-config:
    image: matrixdotorg/synapse:latest
    container_name: guilda-work-synapse-migrate-config
    depends_on:
      - postgres-synapse
    environment:
      SYNAPSE_SERVER_NAME: ${SYNAPSE_SERVER_NAME:-chat.localhost}
      SYNAPSE_REPORT_STATS: "no"
      # Sin TLS dentro del propio Synapse — en el VPS real, Caddy hace de
      # proxy TLS delante (igual que con serve.py), no hace falta que
      # Synapse gestione certificados propios.
      SYNAPSE_NO_TLS: "true"
      POSTGRES_HOST: postgres-synapse
      POSTGRES_DB: synapse
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: ${SYNAPSE_DB_PASSWORD:-CambiaEstaClaveSynapse2026}
    volumes:
      - synapse-data:/data
    command: ["migrate_config"]
    restart: "no"

  synapse:
    image: matrixdotorg/synapse:latest
    container_name: guilda-work-synapse
    restart: unless-stopped
    depends_on:
      - synapse-migrate-config
    ports:
      - "127.0.0.1:8008:8008"
    volumes:
      - synapse-data:/data
      - ./deploy/synapse:/etc/synapse-overrides:ro
    command: ["run", "-c", "/data/homeserver.yaml", "-c", "/etc/synapse-overrides/guilda-overrides.yaml"]

  element-web:
    image: vectorim/element-web:latest
    container_name: guilda-work-element-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:8009:80"
    volumes:
      - ./deploy/synapse/element-config.json:/app/config.json:ro

  # OpenProject: gestión de proyectos/tareas de equipo (Fase 7f) — lo que
  # Tareas Outlook no pretende ser (asignación a varias personas, flujos
  # de estado, vistas Kanban/Gantt). Sin SSO: confirmado en su
  # documentación oficial que el login OIDC/SAML es un Enterprise add-on
  # de pago, no está en la edición community que se despliega aquí —
  # login aparte en el dashboard (app/herramientas.py), como
  # Metabase/n8n.
  postgres-openproject:
    image: postgres:16-alpine
    container_name: guilda-work-postgres-openproject
    restart: unless-stopped
    environment:
      POSTGRES_USER: openproject
      POSTGRES_PASSWORD: ${OPENPROJECT_DB_PASSWORD:-CambiaEstaClaveOpenProject2026}
      POSTGRES_DB: openproject
    volumes:
      - postgres-openproject-data:/var/lib/postgresql/data

  memcached-openproject:
    image: memcached:alpine
    container_name: guilda-work-memcached-openproject
    restart: unless-stopped

  # Corre una vez (crea el esquema y el usuario administrador inicial vía
  # OPENPROJECT_SEED_ADMIN_USER_*) y termina — mismo patrón que
  # kratos-migrate/hydra-migrate/synapse-migrate-config.
  openproject-seeder:
    image: openproject/openproject:${OPENPROJECT_TAG:-15-slim}
    container_name: guilda-work-openproject-seeder
    restart: on-failure
    depends_on:
      - postgres-openproject
      - memcached-openproject
    environment: &openproject-env
      DATABASE_URL: postgres://openproject:${OPENPROJECT_DB_PASSWORD:-CambiaEstaClaveOpenProject2026}@postgres-openproject/openproject
      OPENPROJECT_CACHE__MEMCACHE__SERVER: memcached-openproject:11211
      SECRET_KEY_BASE: ${OPENPROJECT_SECRET_KEY_BASE:?define OPENPROJECT_SECRET_KEY_BASE (openssl rand -hex 64)}
      OPENPROJECT_HTTPS: ${OPENPROJECT_HTTPS:-false}
      OPENPROJECT_HOST__NAME: ${OPENPROJECT_HOST_NAME:-127.0.0.1:8010}
      OPENPROJECT_SEED_ADMIN_USER_PASSWORD: ${OPENPROJECT_SEED_ADMIN_USER_PASSWORD:?define OPENPROJECT_SEED_ADMIN_USER_PASSWORD (min. 10 caracteres)}
      OPENPROJECT_SEED_ADMIN_USER_MAIL: ${OPENPROJECT_SEED_ADMIN_USER_MAIL:-admin@guilda.local}
    command: ["./docker/prod/seeder"]

  openproject-web:
    image: openproject/openproject:${OPENPROJECT_TAG:-15-slim}
    container_name: guilda-work-openproject-web
    restart: unless-stopped
    depends_on:
      - openproject-seeder
    environment: *openproject-env
    ports:
      - "127.0.0.1:8010:8080"
    volumes:
      - openproject-data:/var/openproject/assets
    command: ["./docker/prod/web"]

  openproject-worker:
    image: openproject/openproject:${OPENPROJECT_TAG:-15-slim}
    container_name: guilda-work-openproject-worker
    restart: unless-stopped
    depends_on:
      - openproject-seeder
    environment: *openproject-env
    volumes:
      - openproject-data:/var/openproject/assets
    command: ["./docker/prod/worker"]

  openproject-cron:
    image: openproject/openproject:${OPENPROJECT_TAG:-15-slim}
    container_name: guilda-work-openproject-cron
    restart: unless-stopped
    depends_on:
      - openproject-seeder
    environment: *openproject-env
    volumes:
      - openproject-data:/var/openproject/assets
    command: ["./docker/prod/cron"]

  # Chatwoot: bandeja de soporte omnicanal para incidencias de clientes
  # (Fase 7g) — la pieza más cara de operar del catálogo (Rails +
  # Postgres + Redis + Sidekiq). Sin SSO: confirmado en su documentación
  # oficial que SAML/SSO es un plan Enterprise de pago, no está en la
  # community edition — login aparte en el dashboard, como OpenProject.
  postgres-chatwoot:
    # pgvector/pgvector, no el postgres:16-alpine genérico del resto del
    # proyecto — Chatwoot necesita la extensión pgvector para sus
    # funciones de IA (respuestas asistidas), confirmado en su
    # docker-compose.production.yaml oficial.
    image: pgvector/pgvector:pg16
    container_name: guilda-work-postgres-chatwoot
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatwoot
      POSTGRES_PASSWORD: ${CHATWOOT_DB_PASSWORD:-CambiaEstaClaveChatwoot2026}
      POSTGRES_DB: chatwoot
    volumes:
      - postgres-chatwoot-data:/var/lib/postgresql/data

  redis-chatwoot:
    image: redis:7-alpine
    container_name: guilda-work-redis-chatwoot
    restart: unless-stopped
    # A diferencia de redis-outline, Chatwoot SÍ exige contraseña en su
    # Redis para arrancar.
    command: ["redis-server", "--requirepass", "${CHATWOOT_REDIS_PASSWORD:-CambiaEstaClaveRedisChatwoot2026}"]
    volumes:
      - redis-chatwoot-data:/data

  # Corre una vez (crea el esquema, `db:chatwoot_prepare`) y termina —
  # mismo patrón que kratos-migrate/openproject-seeder. La documentación
  # oficial de Chatwoot lo describe como un comando manual de un solo
  # uso; aquí se automatiza como init container para seguir el mismo
  # patrón que el resto de este proyecto.
  chatwoot-prepare:
    image: chatwoot/chatwoot:latest
    container_name: guilda-work-chatwoot-prepare
    restart: on-failure
    depends_on:
      - postgres-chatwoot
      - redis-chatwoot
    environment: &chatwoot-env
      NODE_ENV: production
      RAILS_ENV: production
      INSTALLATION_ENV: docker
      SECRET_KEY_BASE: ${CHATWOOT_SECRET_KEY_BASE:?define CHATWOOT_SECRET_KEY_BASE (openssl rand -hex 64)}
      FRONTEND_URL: ${CHATWOOT_PUBLIC_ORIGIN:-http://127.0.0.1:8011}
      POSTGRES_HOST: postgres-chatwoot
      POSTGRES_USERNAME: chatwoot
      POSTGRES_PASSWORD: ${CHATWOOT_DB_PASSWORD:-CambiaEstaClaveChatwoot2026}
      POSTGRES_DATABASE: chatwoot
      REDIS_URL: redis://redis-chatwoot:6379
      REDIS_PASSWORD: ${CHATWOOT_REDIS_PASSWORD:-CambiaEstaClaveRedisChatwoot2026}
      # El alta de cuentas nuevas la hace el administrador desde dentro,
      # no un formulario público — mismo criterio que
      # OPENPROJECT_SEED_ADMIN_USER_* (cuenta inicial controlada, no
      # autoregistro abierto).
      ENABLE_ACCOUNT_SIGNUP: "false"
    command: ["bundle", "exec", "rails", "db:chatwoot_prepare"]

  chatwoot-web:
    image: chatwoot/chatwoot:latest
    container_name: guilda-work-chatwoot-web
    restart: unless-stopped
    depends_on:
      - chatwoot-prepare
    environment: *chatwoot-env
    entrypoint: ["docker/entrypoints/rails.sh"]
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    ports:
      - "127.0.0.1:8011:3000"

  chatwoot-sidekiq:
    image: chatwoot/chatwoot:latest
    container_name: guilda-work-chatwoot-sidekiq
    restart: unless-stopped
    depends_on:
      - chatwoot-prepare
    environment: *chatwoot-env
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]

  # sqlite-web (Fase 7c, extra) — visor genérico de TODA la base de datos
  # SQLite de Guilda Work, para consultas SQL ad-hoc del admin. A propósito
  # NO es el backoffice real (ver /backoffice en la propia app): no
  # distingue tenants ni usuarios, no usa el login de Guilda Work, y ve
  # tablas sensibles (tokens_api, sesiones). Por eso: solo loopback (nunca
  # detrás de Caddy/dominio público), contraseña propia obligatoria, y el
  # volumen montado de solo lectura para no arriesgar corromper el archivo
  # mientras serve.py escribe en él a la vez. Acceso previsto vía túnel SSH
  # (`ssh -L 8012:127.0.0.1:8012 ...`), nunca expuesto tal cual.
  sqlite-web:
    image: ghcr.io/coleifer/sqlite-web:latest
    container_name: guilda-work-sqlite-web
    restart: unless-stopped
    environment:
      SQLITE_WEB_PASSWORD: ${SQLITE_WEB_PASSWORD:?}
    volumes:
      - ./data:/data:ro
    ports:
      - "127.0.0.1:8012:8080"
    # La contraseña la coge de SQLITE_WEB_PASSWORD (arriba) — el flag -P
    # es para pedirla por teclado de forma interactiva, no vale en Docker.
    command: ["sqlite_web", "-H", "0.0.0.0", "-r", "/data/registro.db"]

  # Caddy local (Fase 8) — HTTPS real en desarrollo, para poder terminar
  # de verificar los flujos OIDC (Outline/Element) que en local plano
  # (http://127.0.0.1) se quedan bloqueados en el intercambio de token —
  # ver HTTPS_LOCAL.md. `profiles: ["https-local"]` significa que un
  # `docker compose up -d` normal NUNCA lo arranca — hace falta pedirlo
  # explícito con `--profile https-local`, así el día a día de
  # desarrollo (que no necesita HTTPS) no cambia en nada.
  caddy-local:
    image: caddy:latest
    container_name: guilda-work-caddy-local
    restart: unless-stopped
    profiles: ["https-local"]
    ports:
      # Mismo puerto (8443) a los dos lados a propósito — ver el comentario
      # en deploy/Caddyfile.local sobre por qué el puerto interno también
      # tiene que ser 8443, no 443 (Synapse necesita alcanzar el MISMO
      # "https://hydra.localhost:8443/..." tanto desde el navegador como
      # desde dentro de la red de Docker, para que el `iss` de los tokens
      # de Hydra encaje con el issuer que valida su config OIDC).
      - "127.0.0.1:8443:8443"
    volumes:
      - ./deploy/Caddyfile.local:/etc/caddy/Caddyfile:ro
      - caddy-local-data:/data
    # Caddy resuelve *.localhost sin salir a internet (es un TLD
    # especial, RFC 6761) — no necesita el puerto 80 para nada aquí
    # porque `tls internal` no pasa por Let's Encrypt.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Alias en la red interna de Docker: así OTROS contenedores (no solo
    # el navegador) pueden resolver *.localhost y llegar aquí — hace
    # falta para Synapse, cuya librería OIDC exige HTTPS de verdad
    # también en sus llamadas servidor-a-servidor (ver HTTPS_LOCAL.md).
    networks:
      default:
        aliases:
          - app.localhost
          - hydra.localhost
          - outline.localhost
          - chat.localhost
          - matrix.localhost

  # Caddy LAN ("opción 1": servidor en la red local, sin exponerlo a
  # internet) — HTTPS real identificando el servidor por su IP en la LAN
  # (ver deploy/Caddyfile.lan) en vez de *.localhost, que solo vale dentro
  # de esta misma máquina. `profiles: ["lan"]`: nunca se arranca con un
  # `docker compose up -d` normal, hace falta pedirlo explícito con
  # `--profile lan`. A diferencia de caddy-local, publica en `0.0.0.0` (no
  # solo 127.0.0.1) para que otros dispositivos de la LAN puedan alcanzarlo
  # más adelante — hoy mismo, verificar solo desde esta máquina es
  # suficiente antes de mover el servidor a otro equipo.
  caddy-lan:
    image: caddy:latest
    container_name: guilda-work-caddy-lan
    restart: unless-stopped
    profiles: ["lan"]
    environment:
      GUILDA_LAN_IP: ${GUILDA_LAN_IP:?define la IP de esta máquina en la LAN, p.ej. 192.168.1.181}
    ports:
      - "0.0.0.0:8443:8443"
      - "0.0.0.0:8444:8444"
      - "0.0.0.0:8445:8445"
      - "0.0.0.0:8446:8446"
      - "0.0.0.0:8447:8447"
    volumes:
      - ./deploy/Caddyfile.lan:/etc/caddy/Caddyfile:ro
      - caddy-lan-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  metabase-data:
  minio-data:
  n8n-data:
  postgres-kratos-data:
  postgres-hydra-data:
  postgres-outline-data:
  redis-outline-data:
  postgres-synapse-data:
  synapse-data:
  caddy-local-data:
  caddy-lan-data:
  postgres-openproject-data:
  openproject-data:
  postgres-chatwoot-data:
  redis-chatwoot-data:
