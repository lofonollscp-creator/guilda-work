# Instancia de Kratos SOLO para tests (Fase 7a.6) — separada de la de
# desarrollo en docker-compose.yml, en puertos distintos, para que
# `docker compose -f docker-compose.test.yml down -v` (que arranca cada
# sesión de test en limpio) nunca pueda borrar datos de verificación
# manual que tengas en la instancia de desarrollo.
#
# La levanta automáticamente el fixture de sesión `kratos_test` de
# tests/conftest.py — no hace falta arrancarla a mano salvo para depurar.
services:
  postgres-kratos-test:
    image: postgres:16-alpine
    container_name: guilda-work-postgres-kratos-test
    environment:
      POSTGRES_USER: kratos
      POSTGRES_PASSWORD: test
      POSTGRES_DB: kratos

  kratos-migrate-test:
    image: oryd/kratos:latest
    container_name: guilda-work-kratos-migrate-test
    depends_on:
      - postgres-kratos-test
    environment:
      DSN: postgres://kratos:test@postgres-kratos-test:5432/kratos?sslmode=disable
    volumes:
      - ./deploy/kratos:/etc/config/kratos:ro
    command: migrate sql -e --yes --config /etc/config/kratos/kratos.yml
    restart: on-failure

  kratos-test:
    image: oryd/kratos:latest
    container_name: guilda-work-kratos-test
    depends_on:
      - kratos-migrate-test
    environment:
      DSN: postgres://kratos:test@postgres-kratos-test:5432/kratos?sslmode=disable
      SERVE_PUBLIC_BASE_URL: http://127.0.0.1:14433/
      SERVE_ADMIN_BASE_URL: http://127.0.0.1:14434/
    ports:
      - "14433:4433"
      - "14434:4434"
    volumes:
      - ./deploy/kratos:/etc/config/kratos:ro
    command: serve --config /etc/config/kratos/kratos.yml --dev
