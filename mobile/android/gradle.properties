# -Djava.io.tmpdir=C:\gradle-temp evita "java.io.IOException: Unable to
# establish loopback connection" — un bug de UnixDomainSockets en Windows
# cuando %TEMP% contiene espacios (el perfil de este usuario los tiene:
# "Jorge Velasco Sanche"). Sin esto, ni siquiera compila.
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Djava.net.preferIPv4Stack=true -Djava.io.tmpdir=C:\\gradle-temp
# El demonio de Gradle arranca ANTES de que los jvmargs de arriba se
# apliquen, así que con él activado el bug de tmpdir vuelve a aparecer —
# hay que dejarlo desactivado (cada build usa un JVM de un solo uso, algo
# más lento, pero es lo que evita el error).
org.gradle.daemon=false
android.useAndroidX=true
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
